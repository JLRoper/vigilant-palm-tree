<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-55 -70 110 115" width="220" height="230">
  <title>Castle Level 2 — Fortified Town</title>
  <desc>A small town surrounded by a wooden palisade with two watchtowers and a front gate. Still fits within one hex.</desc>

  <defs>
    <g id="log">
      <!-- A single vertical palisade log with pointed top -->
      <path d="M -1.6 0 L -1.6 1 L 1.6 1 L 1.6 0 L 0 -4 Z" fill="#7a5028" stroke="#3a2010" stroke-width="0.6"/>
      <line x1="0" y1="-3" x2="0" y2="1" stroke="#4a2a10" stroke-width="0.3"/>
    </g>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="0" cy="28" rx="48" ry="7" fill="#000" opacity="0.35"/>

  <!-- ============= BACK COTTAGE (largest) ============= -->
  <g>
    <rect x="-10" y="-12" width="20" height="22" fill="#a07848" stroke="#3a2010" stroke-width="1.4"/>
    <line x1="-10" y1="-4" x2="10" y2="-4" stroke="#3a2010" stroke-width="0.9"/>
    <line x1="0" y1="-12" x2="0" y2="10" stroke="#3a2010" stroke-width="0.9"/>
    <polygon points="-13,-12 0,-28 13,-12" fill="#c9a76b" stroke="#4a2a10" stroke-width="1.4"/>
    <line x1="-7" y1="-17" x2="-2" y2="-25" stroke="#8a5a2a" stroke-width="0.5"/>
    <line x1="2" y1="-25" x2="7" y2="-17" stroke="#8a5a2a" stroke-width="0.5"/>
    <rect x="-6" y="-9" width="4" height="4" fill="#ffe066" stroke="#3a2010"/>
    <rect x="-2.5" y="1" width="5" height="9" fill="#3a2010" stroke="#1a0a00"/>
  </g>

  <!-- ============= LEFT COTTAGE ============= -->
  <g>
    <rect x="-30" y="2" width="14" height="16" fill="#9a6c3c" stroke="#3a2010" stroke-width="1.3"/>
    <polygon points="-33,2 -23,-11 -13,2" fill="#c9a76b" stroke="#4a2a10" stroke-width="1.3"/>
    <rect x="-27" y="5" width="3" height="3" fill="#ffe066" stroke="#3a2010"/>
    <rect x="-21" y="11" width="4" height="7" fill="#3a2010"/>
  </g>

  <!-- ============= RIGHT COTTAGE ============= -->
  <g>
    <rect x="16" y="-2" width="16" height="20" fill="#b08050" stroke="#3a2010" stroke-width="1.3"/>
    <polygon points="13,-2 24,-18 35,-2" fill="#c9a76b" stroke="#4a2a10" stroke-width="1.3"/>
    <rect x="18" y="1" width="3" height="3" fill="#ffe066" stroke="#3a2010"/>
    <rect x="27" y="1" width="3" height="3" fill="#ffe066" stroke="#3a2010"/>
    <rect x="22" y="9" width="4" height="8" fill="#3a2010"/>
  </g>

  <!-- ============= BACK PALISADE (row of pointed logs) ============= -->
  <g>
    <!-- Log platform base -->
    <rect x="-36" y="-26" width="72" height="8" fill="#6a4020" stroke="#2a1a10" stroke-width="1"/>
    <line x1="-30" y1="-22" x2="30" y2="-22" stroke="#3a2010" stroke-width="0.5"/>
    <!-- Pointed logs on top -->
    <g>
      <use href="#log" x="-34" y="-26"/>
      <use href="#log" x="-30" y="-26"/>
      <use href="#log" x="-26" y="-26"/>
      <use href="#log" x="-22" y="-26"/>
      <use href="#log" x="-18" y="-26"/>
      <use href="#log" x="-14" y="-26"/>
      <use href="#log" x="-10" y="-26"/>
      <use href="#log" x="-6" y="-26"/>
      <use href="#log" x="-2" y="-26"/>
      <use href="#log" x="2" y="-26"/>
      <use href="#log" x="6" y="-26"/>
      <use href="#log" x="10" y="-26"/>
      <use href="#log" x="14" y="-26"/>
      <use href="#log" x="18" y="-26"/>
      <use href="#log" x="22" y="-26"/>
      <use href="#log" x="26" y="-26"/>
      <use href="#log" x="30" y="-26"/>
      <use href="#log" x="34" y="-26"/>
    </g>
  </g>

  <!-- ============= LEFT PALISADE WALL ============= -->
  <g transform="translate(-36, -18) rotate(70)">
    <rect x="-2" y="0" width="44" height="6" fill="#6a4020" stroke="#2a1a10" stroke-width="1"/>
    <g>
      <use href="#log" x="2" y="0" transform="rotate(180 2 0)"/>
      <use href="#log" x="6" y="0" transform="rotate(180 6 0)"/>
      <use href="#log" x="10" y="0" transform="rotate(180 10 0)"/>
      <use href="#log" x="14" y="0" transform="rotate(180 14 0)"/>
      <use href="#log" x="18" y="0" transform="rotate(180 18 0)"/>
      <use href="#log" x="22" y="0" transform="rotate(180 22 0)"/>
      <use href="#log" x="26" y="0" transform="rotate(180 26 0)"/>
      <use href="#log" x="30" y="0" transform="rotate(180 30 0)"/>
      <use href="#log" x="34" y="0" transform="rotate(180 34 0)"/>
      <use href="#log" x="38" y="0" transform="rotate(180 38 0)"/>
    </g>
  </g>

  <!-- ============= RIGHT PALISADE WALL ============= -->
  <g transform="translate(36, -18) rotate(-70)">
    <rect x="-42" y="0" width="44" height="6" fill="#6a4020" stroke="#2a1a10" stroke-width="1"/>
    <g>
      <use href="#log" x="-40" y="0"/>
      <use href="#log" x="-36" y="0"/>
      <use href="#log" x="-32" y="0"/>
      <use href="#log" x="-28" y="0"/>
      <use href="#log" x="-24" y="0"/>
      <use href="#log" x="-20" y="0"/>
      <use href="#log" x="-16" y="0"/>
      <use href="#log" x="-12" y="0"/>
      <use href="#log" x="-8" y="0"/>
      <use href="#log" x="-4" y="0"/>
    </g>
  </g>

  <!-- ============= FRONT PALISADE (with gate gap) ============= -->
  <g>
    <rect x="-38" y="18" width="26" height="6" fill="#6a4020" stroke="#2a1a10" stroke-width="1"/>
    <rect x="12" y="18" width="26" height="6" fill="#6a4020" stroke="#2a1a10" stroke-width="1"/>
    <g>
      <use href="#log" x="-36" y="18" transform="rotate(180 -36 18)"/>
      <use href="#log" x="-32" y="18" transform="rotate(180 -32 18)"/>
      <use href="#log" x="-28" y="18" transform="rotate(180 -28 18)"/>
      <use href="#log" x="-24" y="18" transform="rotate(180 -24 18)"/>
      <use href="#log" x="-20" y="18" transform="rotate(180 -20 18)"/>
      <use href="#log" x="-16" y="18" transform="rotate(180 -16 18)"/>
      <use href="#log" x="14" y="18" transform="rotate(180 14 18)"/>
      <use href="#log" x="18" y="18" transform="rotate(180 18 18)"/>
      <use href="#log" x="22" y="18" transform="rotate(180 22 18)"/>
      <use href="#log" x="26" y="18" transform="rotate(180 26 18)"/>
      <use href="#log" x="30" y="18" transform="rotate(180 30 18)"/>
      <use href="#log" x="34" y="18" transform="rotate(180 34 18)"/>
    </g>
  </g>

  <!-- ============= GATE (front center) ============= -->
  <g>
    <rect x="-10" y="14" width="20" height="10" fill="#3a2010" stroke="#1a0a00"/>
    <line x1="-7" y1="14" x2="-7" y2="24" stroke="#5a3a1a" stroke-width="0.8"/>
    <line x1="-3.5" y1="14" x2="-3.5" y2="24" stroke="#5a3a1a" stroke-width="0.8"/>
    <line x1="0" y1="14" x2="0" y2="24" stroke="#5a3a1a" stroke-width="0.8"/>
    <line x1="3.5" y1="14" x2="3.5" y2="24" stroke="#5a3a1a" stroke-width="0.8"/>
    <line x1="7" y1="14" x2="7" y2="24" stroke="#5a3a1a" stroke-width="0.8"/>
    <!-- Gate arch above -->
    <path d="M -11 14 Q 0 8 11 14" fill="#6a4020" stroke="#2a1a10" stroke-width="0.8"/>
  </g>

  <!-- ============= LEFT WATCHTOWER ============= -->
  <g>
    <!-- Tower body -->
    <rect x="-42" y="-6" width="8" height="22" fill="#7a5028" stroke="#2a1a10" stroke-width="1.3"/>
    <line x1="-38" y1="-6" x2="-38" y2="16" stroke="#3a2010" stroke-width="0.7"/>
    <line x1="-42" y1="2" x2="-34" y2="2" stroke="#3a2010" stroke-width="0.7"/>
    <line x1="-42" y1="9" x2="-34" y2="9" stroke="#3a2010" stroke-width="0.7"/>
    <!-- Crenellated top -->
    <rect x="-43" y="-12" width="10" height="6" fill="#7a5028" stroke="#2a1a10" stroke-width="1.3"/>
    <rect x="-43" y="-12" width="2" height="3" fill="#5a3a18"/>
    <rect x="-39" y="-12" width="2" height="3" fill="#5a3a18"/>
    <rect x="-35" y="-12" width="2" height="3" fill="#5a3a18"/>
    <!-- Window/slit -->
    <rect x="-39.5" y="4" width="3" height="6" fill="#1a0a00"/>
    <rect x="-39.5" y="5" width="3" height="2" fill="#ffe066" opacity="0.6"/>
  </g>

  <!-- ============= RIGHT WATCHTOWER ============= -->
  <g>
    <rect x="34" y="-6" width="8" height="22" fill="#7a5028" stroke="#2a1a10" stroke-width="1.3"/>
    <line x1="-38" y1="-6" x2="-38" y2="16" transform="translate(76 0)" stroke="#3a2010" stroke-width="0.7"/>
    <line x1="-42" y1="2" x2="-34" y2="2" transform="translate(76 0)" stroke="#3a2010" stroke-width="0.7"/>
    <line x1="-42" y1="9" x2="-34" y2="9" transform="translate(76 0)" stroke="#3a2010" stroke-width="0.7"/>
    <rect x="33" y="-12" width="10" height="6" fill="#7a5028" stroke="#2a1a10" stroke-width="1.3"/>
    <rect x="33" y="-12" width="2" height="3" fill="#5a3a18"/>
    <rect x="37" y="-12" width="2" height="3" fill="#5a3a18"/>
    <rect x="41" y="-12" width="2" height="3" fill="#5a3a18"/>
    <!-- Banner pole -->
    <line x1="38" y1="-22" x2="38" y2="-12" stroke="#3a2010" stroke-width="1"/>
    <polygon points="38,-22 46,-20 38,-16" fill="#cc1a1a" stroke="#5a0a0a" stroke-width="0.8"/>
    <rect x="-39.5" y="4" width="3" height="6" transform="translate(76 0)" fill="#1a0a00"/>
  </g>

  <!-- Foreground path leading out the gate -->
  <path d="M -8 30 Q 0 36 8 30" stroke="#7a5a3a" stroke-width="5" fill="none" opacity="0.7" stroke-linecap="round"/>
</svg>
