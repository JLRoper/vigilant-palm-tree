<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -50 100 95" width="200" height="190">
  <title>Castle Level 1 — Small Town</title>
  <desc>A small medieval hamlet of three thatched cottages. Sits within a single hex footprint.</desc>

  <!-- Ground shadow -->
  <ellipse cx="0" cy="22" rx="42" ry="6" fill="#000" opacity="0.35"/>

  <!-- BACK HALL (largest, centered behind) -->
  <g>
    <!-- Wall -->
    <rect x="-12" y="-18" width="24" height="32" fill="#a07848" stroke="#3a2010" stroke-width="1.5"/>
    <!-- Timber framing -->
    <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#3a2010" stroke-width="1"/>
    <line x1="-12" y1="2" x2="12" y2="2" stroke="#3a2010" stroke-width="1"/>
    <line x1="0" y1="-18" x2="0" y2="14" stroke="#3a2010" stroke-width="1"/>
    <!-- Thatched roof -->
    <polygon points="-15,-18 0,-38 15,-18" fill="#c9a76b" stroke="#4a2a10" stroke-width="1.5"/>
    <!-- Roof thatch lines -->
    <line x1="-10" y1="-24" x2="-2" y2="-33" stroke="#8a5a2a" stroke-width="0.6"/>
    <line x1="2" y1="-33" x2="10" y2="-24" stroke="#8a5a2a" stroke-width="0.6"/>
    <!-- Window upper -->
    <rect x="-7" y="-15" width="5" height="5" fill="#ffe066" stroke="#3a2010" stroke-width="1"/>
    <line x1="-4.5" y1="-15" x2="-4.5" y2="-10" stroke="#3a2010" stroke-width="0.6"/>
    <line x1="-7" y1="-12.5" x2="-2" y2="-12.5" stroke="#3a2010" stroke-width="0.6"/>
    <!-- Door -->
    <rect x="-3.5" y="2" width="7" height="12" fill="#3a2010" stroke="#1a0a00" stroke-width="1"/>
    <circle cx="2" cy="9" r="0.7" fill="#c0a040"/>
  </g>

  <!-- LEFT COTTAGE -->
  <g>
    <!-- Wall -->
    <rect x="-36" y="0" width="18" height="22" fill="#9a6c3c" stroke="#3a2010" stroke-width="1.5"/>
    <line x1="-36" y1="9" x2="-18" y2="9" stroke="#3a2010" stroke-width="1"/>
    <line x1="-27" y1="0" x2="-27" y2="22" stroke="#3a2010" stroke-width="1"/>
    <!-- Thatched roof -->
    <polygon points="-39,0 -27,-16 -15,0" fill="#c9a76b" stroke="#4a2a10" stroke-width="1.5"/>
    <line x1="-33" y1="-8" x2="-22" y2="-15" stroke="#8a5a2a" stroke-width="0.6"/>
    <!-- Window -->
    <rect x="-32" y="4" width="5" height="5" fill="#ffe066" stroke="#3a2010" stroke-width="1"/>
    <line x1="-29.5" y1="4" x2="-29.5" y2="9" stroke="#3a2010" stroke-width="0.6"/>
    <line x1="-32" y1="6.5" x2="-27" y2="6.5" stroke="#3a2010" stroke-width="0.6"/>
    <!-- Door -->
    <rect x="-23" y="13" width="5" height="9" fill="#3a2010" stroke="#1a0a00"/>
  </g>

  <!-- RIGHT COTTAGE -->
  <g>
    <!-- Wall -->
    <rect x="18" y="-4" width="20" height="26" fill="#b08050" stroke="#3a2010" stroke-width="1.5"/>
    <line x1="18" y1="6" x2="38" y2="6" stroke="#3a2010" stroke-width="1"/>
    <line x1="28" y1="-4" x2="28" y2="22" stroke="#3a2010" stroke-width="1"/>
    <!-- Thatched roof -->
    <polygon points="15,-4 28,-24 41,-4" fill="#c9a76b" stroke="#4a2a10" stroke-width="1.5"/>
    <line x1="20" y1="-12" x2="32" y2="-22" stroke="#8a5a2a" stroke-width="0.6"/>
    <!-- Chimney with smoke -->
    <rect x="33" y="-20" width="4" height="7" fill="#5a4a3a" stroke="#2a1a10"/>
    <circle cx="35" cy="-24" r="1.5" fill="#cccccc" opacity="0.7"/>
    <circle cx="37" cy="-28" r="2" fill="#cccccc" opacity="0.5"/>
    <!-- Windows -->
    <rect x="20" y="0" width="4" height="4" fill="#ffe066" stroke="#3a2010" stroke-width="0.8"/>
    <rect x="32" y="0" width="4" height="4" fill="#ffe066" stroke="#3a2010" stroke-width="0.8"/>
    <!-- Door -->
    <rect x="26" y="13" width="5" height="9" fill="#3a2010" stroke="#1a0a00"/>
  </g>

  <!-- Foreground dirt path -->
  <path d="M -34 28 Q 0 24 34 30" stroke="#7a5a3a" stroke-width="5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M -32 30 Q 0 26 32 32" stroke="#9a7a4a" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Wooden barrel -->
  <g transform="translate(-32, 26)">
    <ellipse cx="0" cy="0" rx="3.5" ry="2.8" fill="#7a4a20" stroke="#2a1a10" stroke-width="0.8"/>
    <ellipse cx="0" cy="-1.5" rx="3" ry="1.2" fill="#5a3a18" stroke="#2a1a10" stroke-width="0.5"/>
    <line x1="-3.5" y1="0.5" x2="3.5" y2="0.5" stroke="#2a1a10" stroke-width="0.5"/>
  </g>
</svg>
